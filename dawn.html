<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>시매사 계산기</title>
<!-- 구글 노토 산스 폰트 불러오기 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet" />
<style>
  /* 기본 스타일 및 폰트 */
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Noto Sans', sans-serif;
  }
  body {
    display: flex;
    justify-content: center; /* 가로 중앙 정렬 */
    align-items: center;     /* 세로 중앙 정렬 */
    background-color: #fdfdfd;
    color: #333;
    min-height: 100vh;
    padding: 20px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  body.dark {
    background-color: #121212;
    color: #d6f0f0;
  }

  /* 컨테이너 박스 */
  #container {
    max-width: 480px;
    width: 100%;
    background-color: #fff;
    padding: 24px 20px 40px;
    border-radius: 12px;
    box-sizing: border-box;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  body.dark #container {
    background-color: #1f3936;
  }

  /* 타이틀 */
  h2 {
    font-weight: 700;
    font-size: 1.8rem;
    margin-bottom: 28px;
    text-align: center;
  }
  body.dark h2 {
    color: #54948a;
  }

  /* 레이블 */
  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    font-size: 1.1em;
    color: #4a7a72;
  }
  body.dark label {
    color: #76b4ae;
  }

  /* 입력창 */
  input[type="number"] {
    width: 100%;
    font-size: 1.1em;
    padding: 11px 14px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1.5px solid #bbb;
    box-sizing: border-box;
    background-color: #fff;
    color: #333;
    transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
  }
  body.dark input[type="number"] {
    background-color: #164137;
    border-color: #3a6560;
    color: #d6f0f0;
  }
  input[type="number"]:focus {
    border-color: #54948a;
    outline: none;
  }

  /* 계산 버튼 */
  button.calc {
    width: 100%;
    font-weight: 700;
    font-size: 1.25em;
    padding: 14px 0;
    border-radius: 10px;
    border: none;
    background-color: #54948a;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button.calc:hover {
    background-color: #3f6f69;
  }
  button.calc:active {
    transform: scale(0.97);
  }

  /* 결과 표시 */
  #result {
    margin-top: 26px;
    font-weight: 700;
    font-size: 1.4em;
    min-height: 38px;
    text-align: center;
    user-select: text;
    color: #317066;
    word-break: keep-all;
  }
  body.dark #result {
    color: #7dbfb7;
  }

  /* 모드 토글 버튼 그룹 */
  #modeToggle {
    margin-bottom: 20px;
    text-align: center;
  }
  #modeToggle button {
    font-weight: 600;
    background: none;
    border: 2px solid #54948a;
    color: #54948a;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    margin: 0 6px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  #modeToggle button.active {
    background-color: #54948a;
    color: #fff;
  }

  /* 반응형 */
  @media (max-width: 440px) {
    #container {
      max-width: 100%;
    }
    h2 {
      font-size: 1.5rem;
    }
    #result {
      font-size: 1.2em;
    }
  }
</style>
</head>
<body>

<div id="container">
  <div id="modeToggle">
    <button id="lightBtn" class="active">라이트 모드 ☀️</button>
    <button id="darkBtn">다크 모드 🌙</button>
  </div>

  <h2>시매사 계산기</h2>

  <label for="price">가격 입력 (단맥전)</label>
  <input type="number" id="price" min="0" value="0" placeholder="가격을 입력하세요" />

  <label for="bonusLevel">판매 보너스 단계 입력 (1~20)</label>
  <input type="number" id="bonusLevel" min="1" max="20" value="1" placeholder="1~20 숫자 입력" />

  <label for="taxLevel">세금 감면 단계 입력 (1~20)</label>
  <input type="number" id="taxLevel" min="1" max="20" value="1" placeholder="1~20 숫자 입력" />

  <button class="calc" onclick="calculate()">계산하기</button>

  <div id="result">최종 가격</div>
</div>

<script>
  const bonusData = [
    null,
    0.05, 0.055, 0.06, 0.065, 0.07,
    0.075, 0.08, 0.085, 0.09, 0.095,
    0.10, 0.105, 0.11, 0.115, 0.12,
    0.125, 0.13, 0.135, 0.14, 0.145
  ];

  const taxReduceData = [
    null,
    0.995, 0.99, 0.985, 0.98, 0.975,
    0.97, 0.965, 0.96, 0.955, 0.95,
    0.945, 0.94, 0.935, 0.93, 0.925,
    0.92, 0.915, 0.91, 0.905, 0.90
  ];

  function calculate() {
    const price = Number(document.getElementById('price').value);
    const bonusLevel = Number(document.getElementById('bonusLevel').value);
    const taxLevel = Number(document.getElementById('taxLevel').value);

    if (
      isNaN(price) || price < 0 ||
      bonusLevel < 1 || bonusLevel > 20 ||
      taxLevel < 1 || taxLevel > 20 ||
      !bonusData[bonusLevel] || !taxReduceData[taxLevel]
    ) {
      document.getElementById('result').textContent = "1~20 사이 단계와 올바른 가격을 입력해주세요!";
      return;
    }

    const bonus = bonusData[bonusLevel];
    const taxReduce = taxReduceData[taxLevel];

    const finalPrice = price * (1 + bonus) * taxReduce;

    document.getElementById('result').textContent = `최종 판매 가격: ${Math.round(finalPrice).toLocaleString()} 단맥전입니다!`;
  }

  // 다크/라이트 모드 토글
  const lightBtn = document.getElementById('lightBtn');
  const darkBtn = document.getElementById('darkBtn');
  lightBtn.addEventListener('click', () => {
    document.body.classList.remove('dark');
    lightBtn.classList.add('active');
    darkBtn.classList.remove('active');
  });
  darkBtn.addEventListener('click', () => {
    document.body.classList.add('dark');
    darkBtn.classList.add('active');
    lightBtn.classList.remove('active');
  });
</script>

</body>
</html>
