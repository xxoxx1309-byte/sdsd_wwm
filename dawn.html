<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>시매사 계산기 (보너스 & 세금 감면 구분)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Noto Sans', sans-serif;
    background-color: #121212;
    color: #eee;
    max-width: 440px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 10px;
  }
  label, input, select, button {
    width: 100%;
    max-width: 320px;
    font-size: 1.1em;
    margin: 10px 0 6px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #444;
    background-color: #222;
    color: #eee;
    display: block;
  }
  button {
    background-color: #ff5964;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #f44336;
  }
  #result {
    margin-top: 20px;
    font-size: 1.4em;
    font-weight: 700;
    color: #ff5964;
    text-align: center;
  }
</style>
</head>
<body>

<h2>시매사 계산기</h2>

<label for="price">가격 입력 (원)</label>
<input type="number" id="price" min="0" value="0" />

<label for="bonusLevel">판매 보너스 단계 선택 (1~20)</label>
<select id="bonusLevel"></select>

<label for="taxLevel">세금 감면 단계 선택 (1~20)</label>
<select id="taxLevel"></select>

<button onclick="calculate()">계산하기</button>

<div id="result">최종 가격</div>

<script>
  // 레벨별 판매 보너스 배열 (예시)
  const bonusData = [
    null,
    0.05, 0.055, 0.06, 0.065, 0.07,
    0.075, 0.08, 0.085, 0.09, 0.095,
    0.10, 0.105, 0.11, 0.115, 0.12,
    0.125, 0.13, 0.135, 0.14, 0.145,
  ];

  // 레벨별 세금 감면률 배열 (예시)
  const taxReduceData = [
    null,
    0.995, 0.99, 0.985, 0.98, 0.975,
    0.97, 0.965, 0.96, 0.955, 0.95,
    0.945, 0.94, 0.935, 0.93, 0.925,
    0.92, 0.915, 0.91, 0.905, 0.90
  ];

  const bonusSelect = document.getElementById('bonusLevel');
  const taxSelect = document.getElementById('taxLevel');

  // 옵션 자동 생성 (1~20)
  for(let i=1; i<=20; i++) {
    const bOpt = document.createElement('option');
    bOpt.value = i;
    bOpt.textContent = `${i}단계`;
    bonusSelect.appendChild(bOpt);

    const tOpt = document.createElement('option');
    tOpt.value = i;
    tOpt.textContent = `${i}단계`;
    taxSelect.appendChild(tOpt);
  }

  function calculate() {
    const price = Number(document.getElementById('price').value);
    const bonusLevel = Number(bonusSelect.value);
    const taxLevel = Number(taxSelect.value);

    if (!bonusData[bonusLevel] || !taxReduceData[taxLevel]) {
      document.getElementById('result').textContent = "1~20단계 사이를 선택해주세요!";
      return;
    }

    const bonus = bonusData[bonusLevel];
    const taxReduce = taxReduceData[taxLevel];

    // 계산 공식: 가격 * (1 + 판매 보너스) * 세금 감면률
    const finalPrice = price * (1 + bonus) * taxReduce;

    document.getElementById('result').textContent =
      `최종 판매 가격: ${Math.round(finalPrice).toLocaleString()} 원입니다!`;
  }

  window.onload = () => {
    bonusSelect.value = '1';
    taxSelect.value = '1';
  };
</script>

</body>
</html>
